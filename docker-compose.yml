services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: minipolls-backend
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Data Source=/app/data/minipolls.db
      Cors__AllowedOrigins__0: http://localhost:3000
    volumes:
      - minipolls-data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    container_name: minipolls-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  minipolls-data: